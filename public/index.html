<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JTWebCrawler - Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Animated Background Blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <main class="container">
    <header class="glass-header">
      <h1>JT<span>WebCrawler</span></h1>
      <p>Extreme performance & lightweight crawling platform</p>
    </header>

    <div class="grid">
      <!-- Config Form -->
      <section class="glass-panel">
        <h2>Configuration</h2>
        <form id="crawl-form">
          <div class="form-group">
            <label for="url">Target URL</label>
            <input type="url" id="url" name="url" required placeholder="https://example.com">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="depth">Max Depth</label>
              <input type="number" id="depth" name="depth" required min="1" max="10" value="1">
            </div>
            <div class="form-group">
              <label for="delay">Delay (ms)</label>
              <input type="number" id="delay" name="delay" min="0" value="0">
            </div>
          </div>
          <div class="form-group">
            <label for="outputDir">Output Directory</label>
            <input type="text" id="outputDir" name="outputDir" value="output" placeholder="e.g., output">
          </div>
          <div class="form-group">
            <label for="userAgent">User Agent (Optional)</label>
            <input type="text" id="userAgent" name="userAgent" value="JTWebCrawler/2.0 (+https://github.com/jtome/jtwebcrawler)" placeholder="JTWebCrawler/2.0 (+https://github.com/jtome/jtwebcrawler)">
          </div>
          <div style="display: flex; gap: 1rem; margin-top: 1rem;">
            <button type="submit" id="btn-launch" class="btn-primary" style="margin-top: 0;">Launch Crawler</button>
            <button type="button" id="btn-stop" class="btn-danger" style="margin-top: 0; display: none;">Stop Crawler</button>
          </div>
        </form>
      </section>

      <!-- Logging & Results -->
      <section class="glass-panel logs-panel">
        <div class="panel-header">
          <h2>Stream Logs</h2>
          <div class="status-indicator idle" id="status-indicator">
            <span class="dot"></span> <span id="status-text">Idle</span>
          </div>
        </div>
        <div class="live-stats" id="live-stats" style="display: none;">
          <div class="live-stat"><span>Time:</span> <strong id="live-time">0.0s</strong></div>
          <div class="live-stat"><span>Visited:</span> <strong id="live-visited">0</strong></div>
          <div class="live-stat success"><span>Success:</span> <strong id="live-success">0</strong></div>
          <div class="live-stat error"><span>Errors:</span> <strong id="live-errors">0</strong></div>
        </div>
        <div class="console-wrapper">
          <div class="console" id="console-output">
            <span class="log-line info">Ready to start crawling...</span>
          </div>
          
          <!-- Stats Overlay (hidden by default) -->
          <div class="stats-overlay" id="stats-overlay" style="display: none;">
            <h3>Crawl Results</h3>
            <div class="stats-grid">
              <div class="stat-card">
                 <span class="stat-label">Visited</span>
                 <span class="stat-value" id="stat-visited">0</span>
              </div>
              <div class="stat-card success">
                 <span class="stat-label">Success</span>
                 <span class="stat-value" id="stat-success">0</span>
              </div>
              <div class="stat-card error">
                 <span class="stat-label">Errors</span>
                 <span class="stat-value" id="stat-failed">0</span>
              </div>
              <div class="stat-card">
                 <span class="stat-label">Time (s)</span>
                 <span class="stat-value" id="stat-time">0</span>
              </div>
            </div>
            <p class="stats-footer" id="stat-inventory-file"></p>
            <button id="btn-reset" class="btn-secondary">New Crawl</button>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="app.js?v=2"></script>
</body>
</html>
